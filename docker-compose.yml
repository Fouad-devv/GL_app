version: '3.8'

services:

  # ── Database ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: postgres-GL-Project
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-GLProject}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-GLProject}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gmpp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-GLProject} -d ${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Keycloak ──────────────────────────────────────────────────────────────
  keycloak:
    image: keycloak-backup
    container_name: GL_Keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-postgres}
      KC_DB_USERNAME: ${POSTGRES_USER:-GLProject}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-GLProject}
    ports:
      - "8081:8080"
    volumes:
      - ./keycloak-theme/gmpp:/opt/keycloak/themes/gmpp
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gmpp-network

  # ── Spring Boot backend ───────────────────────────────────────────────────
  backend:
    build:
      context: ./GL_Back/GL
      dockerfile: Dockerfile
    container_name: GL_Backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-postgres}
      DB_USERNAME: ${POSTGRES_USER:-GLProject}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-GLProject}
      KEYCLOAK_SERVER_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-GL_Project}
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/${KEYCLOAK_REALM:-GL_Project}
      KEYCLOAK_JWK_URI: http://keycloak:8080/realms/${KEYCLOAK_REALM:-GL_Project}/protocol/openid-connect/certs
      KEYCLOAK_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - gmpp-network
    restart: unless-stopped

  # ── React frontend (nginx) ────────────────────────────────────────────────
  frontend:
    build:
      context: ./GL_Front
      dockerfile: Dockerfile
      args:
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-http://localhost:8081}
        VITE_KEYCLOAK_REALM: ${KEYCLOAK_REALM:-GL_Project}
        VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID:-FrontJL}
        VITE_API_BASE_URL: ""
    container_name: GL_Frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - gmpp-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  gmpp-network:
    driver: bridge
