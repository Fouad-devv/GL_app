version: '3.8'

services:

  # ── Database ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: postgres-GL-Project
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-GLProject}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-GLProject}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gmpp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-GLProject} -d ${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Keycloak ──────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.5
    container_name: GL_Keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-postgres}
      KC_DB_USERNAME: ${POSTGRES_USER:-GLProject}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-GLProject}
      KC_HOSTNAME_URL: http://localhost:8081
      KC_HOSTNAME_ADMIN_URL: http://localhost:8081
    ports:
      - "8081:8080"
    volumes:
      - ./keycloak-theme/gmpp:/opt/keycloak/themes/gmpp
      - ./keycloak-realm-export.json:/opt/keycloak/data/import/realm-export.json
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8080' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 90s
    networks:
      - gmpp-network

  # ── Spring Boot backend ───────────────────────────────────────────────────
  backend:
    build:
      context: ./GL_Back/GL
      dockerfile: Dockerfile
    container_name: GL_Backend
    environment:
      # Server
      SERVER_PORT: 5000
      SERVER_SERVLET_CONTEXT_PATH: /api
      # Database
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-postgres}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-GLProject}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-GLProject}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      # JPA
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      # Keycloak JWT
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:8081/realms/${KEYCLOAK_REALM:-JL_Project}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/${KEYCLOAK_REALM:-JL_Project}/protocol/openid-connect/certs
      # Keycloak Admin
      KEYCLOAK_SERVER_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-JL_Project}
      KEYCLOAK_ADMIN_CLIENT_ID: admin-cli
      KEYCLOAK_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      # File upload limits (application.properties is gitignored, so set here)
      SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE: 10MB
      SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE: 10MB
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - gmpp-network
    restart: unless-stopped

  # ── React frontend (nginx) ────────────────────────────────────────────────
  frontend:
    build:
      context: ./GL_Front
      dockerfile: Dockerfile
      args:
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL}
        VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM}
        VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID}
        VITE_API_BASE_URL: ""
    container_name: GL_Frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - gmpp-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  gmpp-network:
    driver: bridge
