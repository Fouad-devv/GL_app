# Application Configuration
spring.application.name=MaintenanceApp
server.port=5000
server.servlet.context-path=/api

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=GLProject
spring.datasource.password=GLProject
spring.datasource.driver-class-name=org.postgresql.Driver

spring.mvc.contentnegotiation.favor-parameter=false

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Logging Configuration
logging.level.root=INFO
logging.level.com.gmpp.maintenance=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Keycloak Configuration
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8081/realms/JL_Project
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8081/realms/JL_Project/protocol/openid-connect/certs

# Keycloak Admin
keycloak.server-url=http://localhost:8081
keycloak.realm=JL_Project
keycloak.admin-client-id=admin-cli
keycloak.admin-username=fouad
keycloak.admin-password=fouad

# Management Endpoints
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Server Timeout Configuration
server.servlet.session.timeout=30m
spring.mvc.async.request-timeout=30000

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
